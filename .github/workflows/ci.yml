name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Lint & test (fast, runs first as a gate)
  # ─────────────────────────────────────────────────────────────────────
  check:
    name: Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libxdo-dev
      - name: Check
        run: cargo check --locked
      - name: Test
        run: cargo test --locked

  # ─────────────────────────────────────────────────────────────────────
  # Build matrix — 3 platforms × GPU backends
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - name: windows-x64-cpu
            os: windows-2022
            target: x86_64-pc-windows-msvc
            features: ""
            archive: zip
          - name: windows-x64-vulkan
            os: windows-2022
            target: x86_64-pc-windows-msvc
            features: "gpu-vulkan"
            archive: zip
          - name: windows-x64-cuda
            os: windows-2022
            target: x86_64-pc-windows-msvc
            features: "gpu-cuda"
            archive: zip

          # ── macOS ──
          - name: macos-arm64-cpu
            os: macos-14
            target: aarch64-apple-darwin
            features: ""
            archive: tar.gz
          - name: macos-arm64-metal
            os: macos-14
            target: aarch64-apple-darwin
            features: "gpu-metal"
            archive: tar.gz
          - name: macos-x86_64-cpu
            os: macos-13
            target: x86_64-apple-darwin
            features: ""
            archive: tar.gz

          # ── Linux ──
          - name: linux-x64-cpu
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            features: ""
            archive: tar.gz
          - name: linux-x64-vulkan
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            features: "gpu-vulkan"
            archive: tar.gz
          - name: linux-x64-cuda
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            features: "gpu-cuda"
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          # Use Ninja generator instead of Visual Studio to avoid PDB path length issues
          # in ExternalProject (vulkan-shaders-gen). Ninja is preinstalled on windows-2022.
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          Write-Output "Long paths enabled + CMAKE_GENERATOR=Ninja"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # ── sccache: cache C/C++ compilation (llama.cpp is the bottleneck) ──
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ matrix.name }}-v1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sccache-${{ matrix.name }}-v1-

      - name: Configure sccache for cmake
        shell: bash
        run: |
          # cmake crate (0.1.58) reads CMAKE_TOOLCHAIN_FILE env var (lib.rs:451).
          # We inject sccache as the compiler launcher via a toolchain file,
          # so cmake invokes: sccache cc/cxx ...
          # NOTE: On Windows, the toolchain file breaks ExternalProject (vulkan-shaders-gen),
          # so we only use it on Linux/macOS. Windows relies on rust-cache for caching.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "Skipping cmake toolchain on Windows (breaks ExternalProject)"
          else
            TOOLCHAIN_FILE="$HOME/sccache-toolchain.cmake"
            cat > "$TOOLCHAIN_FILE" << 'EOF'
          set(CMAKE_C_COMPILER_LAUNCHER "sccache" CACHE STRING "" FORCE)
          set(CMAKE_CXX_COMPILER_LAUNCHER "sccache" CACHE STRING "" FORCE)
          set(CMAKE_CUDA_COMPILER_LAUNCHER "sccache" CACHE STRING "" FORCE)
          EOF
            echo "CMAKE_TOOLCHAIN_FILE=$TOOLCHAIN_FILE" >> $GITHUB_ENV
          fi
          # Set SCCACHE_DIR for all platforms
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "SCCACHE_DIR=$HOME/.cache/sccache" >> $GITHUB_ENV
          else
            echo "SCCACHE_DIR=$HOME/.cache/sccache" >> $GITHUB_ENV
          fi

      # ── Platform-specific native deps ──
      - name: Install Linux deps (audio + GTK + Vulkan)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libxdo-dev
          # Vulkan SDK for llama.cpp Vulkan backend
          # llama.cpp 0.1.151 Vulkan backend requires: glslc (shader compiler),
          # libvulkan-dev (loader/headers), and SPIRV-Headers CMake config package.
          # Ubuntu's spirv-headers package may not ship the CMake config file,
          # so we install SPIRV-Headers from source to /usr/local.
          if [[ "${{ matrix.features }}" == *"vulkan"* ]]; then
            sudo apt-get install -y libvulkan-dev libvulkan1 vulkan-tools glslc spirv-headers
            # Install SPIRV-Headers from source (provides CMake config)
            git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers.git /tmp/SPIRV-Headers
            cmake -S /tmp/SPIRV-Headers -B /tmp/SPIRV-Headers/build -DCMAKE_INSTALL_PREFIX=/usr/local
            sudo cmake --install /tmp/SPIRV-Headers/build
          fi

      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux' && contains(matrix.features, 'cuda')
        run: |
          sudo apt-get install -y nvidia-cuda-toolkit
          # Ubuntu's nvidia-cuda-toolkit installs to /usr (headers in /usr/include,
          # libs in /usr/lib/x86_64-linux-gnu). find_cuda_helper expects
          # /usr/local/cuda or CUDA_PATH with targets/x86_64-linux layout.
          # Create symlink structure so both find_cuda_helper and cmake FindCUDAToolkit work.
          sudo mkdir -p /usr/local/cuda/targets/x86_64-linux
          sudo ln -sf /usr/include /usr/local/cuda/targets/x86_64-linux/include
          sudo ln -sf /usr/lib/x86_64-linux-gnu /usr/local/cuda/targets/x86_64-linux/lib
          sudo ln -sf /usr/lib/nvidia-cuda-toolkit /usr/local/cuda/bin 2>/dev/null || true
          echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV
          echo "CUDAToolkit_ROOT=/usr/local/cuda" >> $GITHUB_ENV

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows' && contains(matrix.features, 'cuda')
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.4.1'
          method: 'network'

      - name: Cache Vulkan SDK (Windows)
        if: runner.os == 'Windows' && contains(matrix.features, 'vulkan')
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK
          key: vulkan-minimal-windows-1.3.296.0-v1

      # Install minimal Vulkan components from GitHub instead of downloading
      # the 300MB LunarG SDK installer (which is unreliable on CI).
      # We need: Vulkan headers, vulkan-1.lib (import library), glslc (shader compiler).
      - name: Install Vulkan components (Windows)
        if: runner.os == 'Windows' && contains(matrix.features, 'vulkan') && steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sdkDir = 'C:\VulkanSDK'
          New-Item -ItemType Directory -Force -Path "$sdkDir\Include", "$sdkDir\Lib", "$sdkDir\Bin" | Out-Null

          # 1. Vulkan-Headers (header files + cmake config)
          git clone --depth 1 --branch vulkan-sdk-1.3.296.0 `
            https://github.com/KhronosGroup/Vulkan-Headers.git "$env:TEMP\Vulkan-Headers"
          cmake -S "$env:TEMP\Vulkan-Headers" -B "$env:TEMP\Vulkan-Headers\build" `
            -DCMAKE_INSTALL_PREFIX="$sdkDir"
          cmake --install "$env:TEMP\Vulkan-Headers\build"

          # 2. SPIRV-Headers (required by llama.cpp Vulkan backend cmake)
          git clone --depth 1 --branch vulkan-sdk-1.3.296.0 `
            https://github.com/KhronosGroup/SPIRV-Headers.git "$env:TEMP\SPIRV-Headers"
          cmake -S "$env:TEMP\SPIRV-Headers" -B "$env:TEMP\SPIRV-Headers\build" `
            -DCMAKE_INSTALL_PREFIX="$sdkDir"
          cmake --install "$env:TEMP\SPIRV-Headers\build"

          # 3. glslc (shader compiler from Google shaderc continuous build)
          # The badge page points to install.tgz but actual file is install.zip (~225MB from GCS).
          $badgePage = curl.exe -L -s "https://storage.googleapis.com/shaderc/badges/build_link_windows_vs2022_amd64_release.html"
          $glslcUrl = [regex]::Match($badgePage, 'url=([^"]+)').Groups[1].Value
          if (-not $glslcUrl) { throw "Failed to find shaderc download URL from badge page" }
          # Fix: badge page says .tgz but actual file is .zip
          $glslcUrl = $glslcUrl -replace '\.tgz$', '.zip'
          Write-Output "Downloading glslc from: $glslcUrl"
          $glslcZip = "$env:TEMP\shaderc-install.zip"
          curl.exe -L --retry 3 --connect-timeout 15 --max-time 600 -o $glslcZip $glslcUrl
          if (-not (Test-Path $glslcZip)) { throw "glslc download failed" }
          $glslcSize = (Get-Item $glslcZip).Length
          if ($glslcSize -lt 1MB) { throw "glslc download too small: $glslcSize bytes" }
          Write-Output "Downloaded shaderc: $([math]::Round($glslcSize / 1MB)) MB"
          # Extract and find glslc.exe
          Expand-Archive -Path $glslcZip -DestinationPath "$env:TEMP\shaderc" -Force
          $glslc = Get-ChildItem -Path "$env:TEMP\shaderc" -Recurse -Filter "glslc.exe" | Select-Object -First 1
          if ($glslc) {
            Copy-Item -Path $glslc.FullName -Destination "$sdkDir\Bin\glslc.exe"
            Write-Output "glslc installed from: $($glslc.FullName)"
          } else {
            throw "glslc.exe not found in shaderc archive"
          }

          # 4. vulkan-1.lib — generate import library from Vulkan API headers
          #    (Windows runner may not have vulkan-1.dll, so we extract function
          #    names from vulkan_core.h and create a .def file)
          $vulkanCoreH = "$sdkDir\Include\vulkan\vulkan_core.h"
          if (-not (Test-Path $vulkanCoreH)) { throw "vulkan_core.h not found at $vulkanCoreH" }
          $headerContent = Get-Content $vulkanCoreH -Raw
          # Extract all VKAPI_CALL function names: "VKAPI_CALL vkFooBar"
          $funcs = [regex]::Matches($headerContent, 'VKAPI_CALL\s+(vk\w+)') | ForEach-Object { $_.Groups[1].Value } | Sort-Object -Unique
          if ($funcs.Count -eq 0) { throw "No Vulkan API functions found in header" }
          Write-Output "Found $($funcs.Count) Vulkan API functions"
          $defContent = "LIBRARY vulkan-1.dll`nEXPORTS`n" + (($funcs | ForEach-Object { $_ }) -join "`n")
          $defFile = "$env:TEMP\vulkan-1.def"
          $defContent | Out-File -FilePath $defFile -Encoding ASCII
          # Find lib.exe
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $libExe = & $vswhere -latest -find "VC\Tools\MSVC\*\bin\Hostx64\x64\lib.exe" | Select-Object -First 1
          if (-not $libExe -or -not (Test-Path $libExe)) { throw "lib.exe not found" }
          & $libExe "/def:$defFile" "/out:$sdkDir\Lib\vulkan-1.lib" /machine:x64
          if (-not (Test-Path "$sdkDir\Lib\vulkan-1.lib")) {
            throw "Failed to create vulkan-1.lib"
          }
          Write-Output "Generated vulkan-1.lib with $($funcs.Count) exports"

          Write-Output "=== Vulkan SDK layout ==="
          Get-ChildItem -Path $sdkDir -Recurse -File | ForEach-Object { Write-Output "  $($_.FullName)" }

      - name: Set VULKAN_SDK env (Windows)
        if: runner.os == 'Windows' && contains(matrix.features, 'vulkan')
        shell: pwsh
        run: |
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV
          # Add glslc to PATH
          echo "C:\VulkanSDK\Bin" >> $env:GITHUB_PATH

      - name: Install Linux CUDA libs for ort (Linux)
        if: runner.os == 'Linux' && contains(matrix.features, 'cuda')
        run: |
          echo "ORT_LIB_CUDA=/usr/local/cuda/targets/x86_64-linux/lib" >> $GITHUB_ENV

      # ── Build ──
      - name: Build
        shell: bash
        run: |
          FEATURES_ARG=""
          if [ -n "${{ matrix.features }}" ]; then
            FEATURES_ARG="--features ${{ matrix.features }}"
          fi
          cargo build --release --locked --target ${{ matrix.target }} $FEATURES_ARG

      # ── Package ──
      - name: Package
        shell: bash
        run: |
          STAGING="staging/dictate-in-${{ matrix.name }}"
          mkdir -p "$STAGING"/{config,models,logs,cache}

          # Binary
          BIN_NAME="dictate-in"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN_NAME="dictate-in.exe"
          fi
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "$STAGING/"

          # Shared libraries (DLLs / dylibs / .so)
          case "${{ runner.os }}" in
            Windows)
              cp target/${{ matrix.target }}/release/*.dll "$STAGING/" 2>/dev/null || true
              ;;
            macOS)
              cp target/${{ matrix.target }}/release/*.dylib "$STAGING/" 2>/dev/null || true
              ;;
            Linux)
              cp target/${{ matrix.target }}/release/*.so "$STAGING/" 2>/dev/null || true
              # Vulkan/CUDA runtime libs
              if [[ "${{ matrix.features }}" == *"vulkan"* ]]; then
                cp /usr/lib/x86_64-linux-gnu/libvulkan.so* "$STAGING/" 2>/dev/null || true
              fi
              ;;
          esac

          # README
          cat > "$STAGING/README.txt" << 'README_EOF'
          DictateIn — 本地语音输入
          ============================
          完全本地运行，不开放网络端口。

          用法：
            1. 将模型文件放入 models/ 目录（见下方说明）
            2. 运行 dictate-in.exe（或对应平台的二进制）
            3. 按住快捷键说话，松开上屏

          模型下载：https://github.com/HaujetZhao/CapsWriter-Offline/releases/tag/models
          README_EOF

          # Archive
          cd staging
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a -tzip "../dictate-in-${{ matrix.name }}.zip" dictate-in-${{ matrix.name }}
          else
            tar czf "../dictate-in-${{ matrix.name }}.tar.gz" dictate-in-${{ matrix.name }}
          fi
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dictate-in-${{ matrix.name }}
          path: dictate-in-${{ matrix.name }}.${{ matrix.archive }}
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Release — upload archives to GitHub Releases on tag push
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
